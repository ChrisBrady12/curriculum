<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000d0e">
<meta name="mobile-web-app-capable" content="yes">
<title>Nueva página</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*, *::before, *::after {
box-sizing: border-box;
margin: 0;
padding: 0;
}

:root{
--primary:#009ca4;
--primary-glow:rgba(0,156,164,0.55);
--orange:#F7941D;
--magenta:#EC008C;
--bg:#000d0e;
--text:#ff7b00;
}

body{
font-family:'Montserrat',sans-serif;
background:var(--bg);
min-height:100vh;
padding:16px 16px 48px;
display:flex;
flex-direction:column;
align-items:center;
overflow-x:hidden;
position:relative;
}

/* blobs decorativos */

body::before{
content:'';
position:fixed;
width:420px;
height:420px;
border-radius:50%;
background:radial-gradient(circle,var(--primary),transparent 65%);
top:-130px;
left:-110px;
opacity:0.18;
}

body::after{
content:'';
position:fixed;
width:300px;
height:300px;
border-radius:50%;
background:radial-gradient(circle,var(--primary),transparent 65%);
bottom:-90px;
right:-80px;
opacity:0.10;
}

.logo-area{
margin-bottom:20px;
text-align:center;
}

.logo-area img{
max-width:180px;
width:100%;
height:auto;
filter:drop-shadow(0 0 16px var(--primary-glow));
}

.container{
background:rgba(0,18,20,0.82);
border:1px solid rgba(0,156,164,0.30);
backdrop-filter:blur(24px);
border-radius:26px;
padding:0 22px 36px;
max-width:480px;
width:100%;
box-shadow:
0 16px 50px rgba(0,156,164,0.14),
0 40px 90px rgba(0,0,0,0.70);
text-align:center;
}

.container::before{
content:'';
display:block;
height:3px;
background:linear-gradient(90deg,var(--primary),rgba(247,148,29,0.6));
border-radius:26px 26px 0 0;
margin:0 -22px 30px;
}

h1{
font-size:30px;
font-weight:800;
letter-spacing:1px;
color:var(--text);
}

h2{
font-size:20px;
font-weight:600;
letter-spacing:1px;
color:var(--primary);
margin-bottom:35px;
text-shadow:0 0 16px var(--primary-glow);
}

/* ANIMACION SOLO DEL HALO */

@keyframes haloBreathing{

0%{
box-shadow:
0 0 10px rgba(0,156,164,0.35),
0 0 20px rgba(0,156,164,0.25);
}

50%{
box-shadow:
0 0 24px rgba(0,156,164,0.75),
0 0 46px rgba(0,156,164,0.55);
}

100%{
box-shadow:
0 0 10px rgba(0,156,164,0.35),
0 0 20px rgba(0,156,164,0.25);
}

}

/* BOTON */

.btn-primary{
display:inline-flex;
align-items:center;
justify-content:center;
width:100%;
max-width:320px;
margin:0 auto 35px auto;
background:linear-gradient(135deg,var(--primary),#007a82);
border:none;
color:#ffffff;
padding:16px 28px;
border-radius:14px;
text-decoration:none;
font-weight:700;
letter-spacing:2px;
font-size:25px;
animation:haloBreathing 3s ease-in-out infinite;
}

.btn-primary:hover{
background:linear-gradient(135deg,#00b1ba,var(--primary));
}

.img-footer{
max-width:100%;
height:200px;
border-radius:16px;
display:block;
margin:0 auto;
}

.color-strip{
display:flex;
gap:6px;
justify-content:center;
margin-top:36px;
}

.color-strip span{
height:3px;
border-radius:999px;
flex:1;
max-width:56px;
}

.cs-teal{background:#009ca4;opacity:.9;}
.cs-teal2{background:#009ca4;opacity:.6;}
.cs-orange{background:#F7941D;opacity:.4;}
.cs-magenta{background:#EC008C;opacity:.3;}

</style>
</head>

<body>

<div class="logo-area">
<img src="izzi.png" alt="logo izzi"><br>
</div>

<div class="container">

<br>
<h1>CURRICULUM INTERNO</h1><br><br>

<h2>POR FAVOR PRESIONE EL BOTON E INGRESE LOS DATOS SOLICITADOS</h2><br>

<a href="https://forms.office.com/r/8A2aa2U4mE" class="btn-primary">PROMOTOK 1</a><br><br>

<img src="cv4.png" alt="imagen" class="img-footer">

<div class="color-strip">
<span class="cs-teal"></span>
<span class="cs-teal2"></span>
<span class="cs-orange"></span>
<span class="cs-magenta"></span>
</div>

</div>

</body>
</html>
